services:
  balanz-app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    environment:
      # host:port of the real Balanz OCPP server, reachable from this
      # container over the local network - only used if VITE_API_BASE_URL
      # above points at this app's own origin (see README's "Reverse
      # proxying /api" section). Change the default for anything beyond
      # local single-machine testing.
      BALANZ_UPSTREAM: ${BALANZ_UPSTREAM:-host.docker.internal:8000}
    # host.docker.internal resolves automatically on Docker Desktop
    # (Mac/Windows) but needs this explicit mapping on plain Linux - the
    # likely OS for an on-prem server. Harmless to keep even when
    # BALANZ_UPSTREAM is overridden to a real LAN address instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_PORT:-8081}:80"
    restart: unless-stopped
